{% if flashsale_exists %}
<section class="flash-sale-banner">
  <div class="flash-sale-content">
    <div class="flash-sale-text">
      <div class="flashsale-section">
        <div class="section-header">
            <h2 ><span class="alarm-emoji">🚨</span> Flash Sale Live!!</h2>
            <div class="limited-offer">Limited Time Offers</div>
        </div>
        <!-- rest of your content -->
    </div>
    
    <style>
    @keyframes flashAndPulse {
        0% {
            transform: scale(1);
            opacity: 1;
        }
        25% {
            transform: scale(1.3);
            opacity: 0.6;
        }
        50% {
            transform: scale(1);
            opacity: 1;
        }
        75% {
            transform: scale(1.3);
            opacity: 0.6;
        }
        100% {
            transform: scale(1);
            opacity: 1;
        }
    }
    
    .alarm-emoji {
        display: inline-block;
        animation: flashAndPulse 1s infinite ease-in-out;
        margin-right: 10px;
        font-size: 1.5em;
    }
    </style>
          <p>Huge discounts on selected vehicles - Limited time only! Hurry!</p>
    </div>
    <a href="{% url 'available_vehicles' %}?flashsale=true" class="flash-sale-button">
      SHOP NOW & SAVE BIG →
    </a>
  </div>
</section>
{% endif %}
